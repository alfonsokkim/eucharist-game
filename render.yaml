# Render Blueprint - deploys the Socket.IO game as a persistent web service.
# In Render: New → Blueprint → point at this repo. Render injects PORT, which
# server.js already reads. WebSockets work out of the box on Render web services.
services:
  - type: web
    name: recreate-the-mass
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22"
